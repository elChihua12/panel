<script>
function showTip(e, title, body) {
  const tip = document.getElementById('tip');
  const wrap = document.getElementById('svg-wrap');
  const rect = wrap.getBoundingClientRect();
  const svgEl = wrap.querySelector('svg');
  const svgRect = svgEl.getBoundingClientRect();
  const scaleX = svgRect.width / 680;
  const clickX = e.clientX - svgRect.left;
  const clickY = e.clientY - svgRect.top;
  tip.innerHTML = '<strong style="font-size:13px">' + title + '</strong><br><span style="color:var(--color-text-secondary)">' + body + '</span>';
  tip.style.display = 'block';
  let lx = clickX + 12;
  if (lx + 230 > svgRect.width) lx = clickX - 240;
  tip.style.left = lx + 'px';
  tip.style.top = (clickY - 20) + 'px';
  setTimeout(() => { tip.style.display = 'none'; }, 4000);
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.phase')) document.getElementById('tip').style.display = 'none';
});
</script>
