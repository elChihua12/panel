<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS Semanal — Panel Bastián</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0e14; font-family: 'DM Sans', system-ui, sans-serif; min-height: 100vh; }
  .back { display: inline-block; font-family: 'Space Mono', monospace; font-size: .7rem; color: #78716c; text-decoration: none; text-transform: uppercase; letter-spacing: .1em; padding: 14px 18px 0; }
  .back:hover { color: #f59e0b; }
</style>
</head>
<body>
  <a class="back" href="../index.html">← Panel</a>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    /* Shim de almacenamiento — el artefacto original usaba window.storage (API de host).
       Lo respaldamos con localStorage para que persista en este navegador (clave "os-v7"). */
    window.storage = {
      get:    async (k) => { const v = localStorage.getItem(k); return v == null ? null : { value: v }; },
      set:    async (k, v) => { localStorage.setItem(k, v); },
      delete: async (k) => { localStorage.removeItem(k); }
    };
  </script>

  <script type="text/babel" src="os-semanal.jsx"></script>
</body>
</html>
